<!-- health@work — FGF "รถทัวร์ ลุ้นทอง!" registration LIFF with Pokémon-TCG holographic ticket -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+Thai:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --calm-teal:#0D6B6E;
    --energy-aqua:#15A38C;
    --spark-green:#C5E63B;
    --teal-deep:#0A4F52;
    --btn:#0E8B7C;
    --btn-press:#0a6f63;
    --ink:#2b3a3a;
    --ink-soft:#5a6a6a;
    font-family:'Nunito','Noto Sans Thai',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:#0d1413;
    display:flex;align-items:center;justify-content:center;
    min-height:100dvh;font-family:inherit;
  }

  /* ---------- phone frame ---------- */
  .phone{
    position:relative;width:100%;max-width:430px;height:100dvh;max-height:932px;
    background:#fff;overflow:hidden;display:flex;flex-direction:column;
    box-shadow:0 30px 80px rgba(0,0,0,.55);
  }
  @media (min-width:460px){ .phone{border-radius:42px;} }

  /* status bar */
  .statusbar{
    flex:0 0 auto;height:46px;background:#fff;display:flex;align-items:center;
    justify-content:space-between;padding:0 26px;font-weight:800;color:#0c1414;
    font-size:16px;letter-spacing:.3px;
  }
  .statusbar .icons{display:flex;align-items:center;gap:6px;}
  .statusbar svg{display:block;}

  /* header */
  .header{
    flex:0 0 auto;background:#fff;display:grid;grid-template-columns:44px 1fr 44px;
    align-items:center;padding:6px 12px 12px;
  }
  .header button{background:none;border:0;padding:8px;cursor:pointer;color:#1d2a2a;display:flex;align-items:center;justify-content:center;}
  .header .title{text-align:center;line-height:1.05;}
  .header .title b{display:block;font-weight:800;font-size:19px;color:#16302f;}
  .header .title span{display:block;font-size:12.5px;color:#9aa6a6;font-weight:600;margin-top:1px;}

  /* ---------- scroll body ---------- */
  .body{
    flex:1 1 auto;position:relative;overflow-y:auto;-webkit-overflow-scrolling:touch;
    background:
      radial-gradient(120% 70% at 50% 40%, rgba(120,224,150,.55) 0%, rgba(46,170,140,0) 55%),
      radial-gradient(95% 60% at 50% 62%, rgba(197,230,59,.40) 0%, rgba(197,230,59,0) 60%),
      linear-gradient(180deg,#0B5B5C 0%, #128172 30%, #25A878 60%, #3FB87E 100%);
  }

  .hero{padding:18px 22px 0;text-align:center;}
  .eyebrow{color:#eafff6;font-weight:700;font-size:15px;letter-spacing:.2px;opacity:.95;margin:0 0 2px;}
  .headline-wrap{margin:0 0 4px;}
  .headline-wrap svg{width:100%;height:auto;display:block;overflow:visible;max-width:340px;margin:0 auto;}
  .headline-wrap text{
    font-family:'Noto Sans Thai','Nunito',sans-serif;font-weight:900;fill:#fff;
    font-size:50px;
    paint-order:stroke;
    filter:drop-shadow(0 6px 14px rgba(0,40,30,.25));
  }

  /* ---------- holographic ticket ---------- */
  .stage{position:relative;padding:14px 26px 8px;display:flex;justify-content:center;}
  /* entrance: the "item get" reveal */
  .reveal-card{
    position:relative;z-index:1;
    width:100%;max-width:360px;
    transform-origin:center;
    animation:cardReveal 2.1s cubic-bezier(.16,.7,.2,1) .2s both;
  }
  @keyframes cardReveal{
    0%   {opacity:0;transform:perspective(1000px) rotateY(-72deg) scale(.5);filter:blur(7px) brightness(2);}
    30%  {opacity:1;}
    60%  {filter:blur(0) brightness(1.3);}
    82%  {transform:perspective(1000px) rotateY(7deg) scale(1.05);filter:brightness(1.1);}
    100% {opacity:1;transform:perspective(1000px) rotateY(0) scale(1);filter:none;}
  }
  /* reveal flash burst behind the card */
  .stage .flash{
    position:absolute;left:50%;top:50%;width:70%;padding-top:44%;
    transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;
    background:radial-gradient(circle, rgba(255,255,255,.95) 0%, rgba(197,230,59,.65) 25%, rgba(46,196,182,0) 65%);
    opacity:0;animation:flashBurst 1.8s ease-out .25s both;z-index:0;
  }
  @keyframes flashBurst{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.2);}
    35%{opacity:.95;}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1.6);}
  }
  /* idle float so the card looks like it's hovering */
  .float{
    perspective:1200px;
    animation:floaty 4.5s ease-in-out 2.4s infinite;
    will-change:transform;
  }
  @keyframes floaty{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-9px);}
  }
  .ticket{
    position:relative;width:100%;aspect-ratio:1100/688;
    border-radius:22px;cursor:pointer;
    transform-style:preserve-3d;
    transform:rotateX(0deg) rotateY(0deg);
    transition:transform .5s cubic-bezier(.2,.8,.2,1);
    will-change:transform;
    isolation:isolate;
  }

  /* layer: rainbow foil */
  .layer{position:absolute;inset:0;border-radius:inherit;pointer-events:none;overflow:hidden;}
  .foil{
    background-image:
      repeating-linear-gradient(
        110deg,
        hsla(0,90%,65%,.55) 0%, hsla(45,95%,62%,.55) 8%, hsla(120,80%,60%,.55) 16%,
        hsla(190,90%,62%,.55) 24%, hsla(255,90%,68%,.55) 32%, hsla(320,90%,66%,.55) 40%,
        hsla(0,90%,65%,.55) 48%);
    background-size:300% 300%;
    background-position:calc(var(--px,.5)*100%) calc(var(--py,.5)*100%);
    mix-blend-mode:color-dodge;
    opacity:calc(var(--active,0)*.6);
    transition:opacity .5s ease;
  }
  .foil.b{
    background-image:
      repeating-linear-gradient(
        -40deg,
        hsla(180,90%,70%,.45) 0%, hsla(280,90%,72%,.45) 10%, hsla(40,95%,66%,.45) 20%,
        hsla(150,85%,64%,.45) 30%, hsla(180,90%,70%,.45) 40%);
    background-size:240% 240%;
    background-position:calc((1 - var(--px,.5))*100%) calc(var(--py,.5)*100%);
    mix-blend-mode:overlay;
    opacity:calc(var(--active,0)*.5);
    transition:opacity .5s ease;
  }
  /* occasional ambient shimmer — keeps the real colours visible */
  .sweep{
    background:linear-gradient(105deg,
      transparent 42%,
      rgba(255,255,255,.5) 50%, transparent 58%);
    background-size:300% 100%;
    mix-blend-mode:soft-light;
    opacity:0;
    animation:sweep 7s ease-in-out 2.8s infinite;
  }
  @keyframes sweep{
    0%, 72%   {background-position:150% 0;opacity:0;}
    80%       {opacity:1;}
    88%       {opacity:1;}
    100%      {background-position:-50% 0;opacity:0;}
  }
  /* glare following pointer */
  .glare{
    background:radial-gradient(circle at calc(var(--px,.5)*100%) calc(var(--py,.5)*100%),
      rgba(255,255,255,.55) 0%, rgba(255,255,255,.18) 18%, rgba(255,255,255,0) 45%);
    mix-blend-mode:overlay;
    opacity:calc(var(--active,0)*.7);
    transition:opacity .5s ease;
  }
  /* glitter dots */
  .glitter{
    background-image:
      radial-gradient(1.6px 1.6px at 12% 22%, #fff 50%, transparent 51%),
      radial-gradient(1.4px 1.4px at 28% 64%, #fff 50%, transparent 51%),
      radial-gradient(1.8px 1.8px at 41% 35%, #fff 50%, transparent 51%),
      radial-gradient(1.3px 1.3px at 55% 78%, #fff 50%, transparent 51%),
      radial-gradient(1.7px 1.7px at 67% 28%, #fff 50%, transparent 51%),
      radial-gradient(1.4px 1.4px at 78% 58%, #fff 50%, transparent 51%),
      radial-gradient(1.6px 1.6px at 88% 40%, #fff 50%, transparent 51%),
      radial-gradient(1.3px 1.3px at 20% 84%, #fff 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 48% 14%, #fff 50%, transparent 51%),
      radial-gradient(1.4px 1.4px at 72% 86%, #fff 50%, transparent 51%);
    mix-blend-mode:screen;
    opacity:calc(var(--active,0)*.8);
    transition:opacity .5s ease;
    animation:glint 2.6s steps(1,end) infinite;
  }
  @keyframes glint{0%,100%{filter:brightness(1)}50%{filter:brightness(.35)}}
  .ticket .edge{position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.20);pointer-events:none;}

  /* big ✦ sparkles that pop like opening a card, then twinkle occasionally */
  .spark{position:absolute;color:#fff;pointer-events:none;
    filter:drop-shadow(0 0 6px rgba(255,255,255,.9));
    animation:twinkle 3.8s ease-in-out infinite;transform:scale(0);}
  .spark.gold{color:#FFD23F;filter:drop-shadow(0 0 7px rgba(255,200,40,.95));}
  @keyframes twinkle{
    0%{transform:scale(0) rotate(0deg);opacity:0;}
    8%{transform:scale(1.15) rotate(18deg);opacity:1;}
    16%{transform:scale(.6) rotate(30deg);opacity:.5;}
    24%{transform:scale(1) rotate(36deg);opacity:.85;}
    34%,100%{transform:scale(0) rotate(45deg);opacity:0;}
  }

  /* ---------- bottom panel ---------- */
  .panel{
    margin:16px 14px 16px;background:#fff;border-radius:26px;
    padding:20px 22px 18px;box-shadow:0 12px 40px rgba(4,40,34,.20);
  }
  .panel h2{margin:0 0 12px;font-weight:900;font-size:19px;color:var(--ink);text-align:center;line-height:1.35;}
  .panel ol{margin:0 0 16px;padding-left:4px;list-style:none;counter-reset:s;}
  .panel li{counter-increment:s;display:flex;gap:7px;font-size:15px;color:#3a4a4a;font-weight:500;line-height:1.5;margin:5px 0;}
  .panel li::before{content:counter(s)".";font-weight:800;color:#3a4a4a;min-width:16px;}
  .cta{
    width:100%;border:0;border-radius:999px;padding:15px 18px;cursor:pointer;
    background:var(--btn);color:#fff;font-family:inherit;font-weight:800;font-size:17px;
    box-shadow:0 8px 18px rgba(14,139,124,.35);transition:transform .12s ease,background .15s ease;

  .later{display:block;width:100%;text-align:center;margin:15px auto 2px;background:none;border:0;
    cursor:pointer;color:#3a4a4a;font-family:inherit;font-weight:700;font-size:15px;text-decoration:underline;text-underline-offset:3px;}

  .reveal{animation:rise .7s cubic-bezier(.2,.8,.2,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
  @keyframes slideUp{from{opacity:0;transform:translateY(70px) scale(.98);}to{opacity:1;transform:none;}}
  /* kill all animations momentarily to restart them */
  .restart, .restart *{animation:none !important;}
  /* replay button — DEV/DESIGN PREVIEW ONLY, not part of the real LIFF UI */
  .replay{
    position:absolute;top:12px;right:12px;z-index:5;
    display:inline-flex;align-items:center;gap:5px;
    padding:6px 11px 6px 9px;border:1px dashed rgba(255,255,255,.7);border-radius:999px;cursor:pointer;

  .replay svg{display:block;transition:transform .5s cubic-bezier(.2,.8,.2,1);}
  .replay.spin svg{transform:rotate(-360deg);}
  @media (prefers-reduced-motion: reduce){
    .reveal-card,.flash,.float,.hero,.panel,.spark,.sweep,.glitter{animation:none!important;}

<script>
(function(){
  var ticket = document.getElementById('ticket');
  var art = ticket.querySelector('.art');
  var MAX = 14; // deg
  var raf = null, tx=.5, ty=.5, active=0, targetActive=0;

  function render(){
    ticket.style.setProperty('--px', tx.toFixed(3));
    ticket.style.setProperty('--py', ty.toFixed(3));
    ticket.style.setProperty('--active', active.toFixed(3));
    var ry = (tx - .5) *  MAX * 2;
    var rx = (.5 - ty) *  MAX * 2;
    ticket.style.transform = 'rotateX('+rx.toFixed(2)+'deg) rotateY('+ry.toFixed(2)+'deg) scale('+(1+active*.04).toFixed(3)+')';
  }
  function loop(){
    active += (targetActive-active)*0.12;
    render();
    if(Math.abs(targetActive-active)>0.002){ raf=requestAnimationFrame(loop); }
    else { active=targetActive; render(); raf=null; }
  }
  function kick(){ if(!raf) raf=requestAnimationFrame(loop); }

  function move(clientX, clientY){
    var r = ticket.getBoundingClientRect();
    tx = Math.min(1,Math.max(0,(clientX-r.left)/r.width));
    ty = Math.min(1,Math.max(0,(clientY-r.top)/r.height));
    ticket.style.transition='transform .08s linear';
    render();
  }
  ticket.addEventListener('pointerenter', function(){ targetActive=1; kick(); });
  ticket.addEventListener('pointermove', function(e){ move(e.clientX,e.clientY); });
  ticket.addEventListener('pointerleave', function(){
    targetActive=0; tx=.5; ty=.5;
    ticket.style.transition='transform .6s cubic-bezier(.2,.8,.2,1)';
    kick();
  });

  // ---------- touch drag (mobile: แตะค้างแล้วลากนิ้ว) ----------
  ticket.addEventListener('touchstart', function(e){
    e.preventDefault();
    targetActive=1; kick();
    var t=e.touches[0];
    move(t.clientX, t.clientY);
  }, {passive:false});
  ticket.addEventListener('touchmove', function(e){
    e.preventDefault();
    var t=e.touches[0];
    move(t.clientX, t.clientY);
  }, {passive:false});
  ticket.addEventListener('touchend', function(){
    targetActive=0; tx=.5; ty=.5;
    ticket.style.transition='transform .6s cubic-bezier(.2,.8,.2,1)';
    kick();
  });

  // device tilt for mobile (no pointer hover)
  function onTilt(e){
    var g = e.gamma||0, b = e.beta||0;       // gamma:-90..90 (L-R), beta:-180..180 (F-B)
    tx = Math.min(1,Math.max(0,(g+30)/60));
    ty = Math.min(1,Math.max(0,(b-20)/60));
    targetActive=1; render(); 
  }
  function enableTilt(){ window.addEventListener('deviceorientation', onTilt); }
  if(window.DeviceOrientationEvent){
    if(typeof DeviceOrientationEvent.requestPermission === 'function'){
      // iOS 13+ needs a user gesture
      ticket.addEventListener('click', function once(){
        DeviceOrientationEvent.requestPermission().then(function(s){ if(s==='granted') enableTilt(); }).catch(function(){});
        ticket.removeEventListener('click', once);
      });
    } else { enableTilt(); }
  }
  render();

  // ---- replay the intro animations ----
  var phone = document.querySelector('.phone');
  var replayBtn = document.getElementById('replay');
  var body = document.getElementById('body');
  replayBtn.addEventListener('click', function(){
    // reset any interaction state on the ticket
    targetActive = 0; active = 0; tx = .5; ty = .5;
    ticket.style.transition = 'none';
    render();
    // scroll back to top so the whole sequence is visible
    body.scrollTop = 0;
    // restart every animation: kill, force reflow, restore
    replayBtn.classList.remove('spin');
    phone.classList.add('restart');
    void phone.offsetWidth;            // reflow flushes the "none" state
    phone.classList.remove('restart'); // animations re-trigger from 0
    // spin the icon for feedback
    void replayBtn.offsetWidth;
    replayBtn.classList.add('spin');
    setTimeout(function(){ ticket.style.transition = ''; }, 50);
  });
})();
</script>
